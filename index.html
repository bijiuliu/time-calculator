<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <meta name="description" content="时间差、日期差与时间日期推算工具">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./font/400.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/typography.css">
  <title>时间计算器 2.0</title>
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="./assets/icons/icon-192.png" alt="" decoding="async">
        </div>
        <div><strong>时间计算器</strong><small>VERSION 2.0</small></div>
      </div>
      <button class="icon-button theme-toggle" id="headerThemeToggle" type="button" aria-label="切换显示模式"></button>
    </header>

    <main class="app-main">
      <section class="page active" id="calculatorPage" aria-label="计算器">
        <div class="calculator-switch" role="tablist" aria-label="计算器类型">
          <button class="type-button active" data-calculator="time" type="button">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 7v5l3 2"></path></svg><span>时间计算</span>
          </button>
          <button class="type-button" data-calculator="date" type="button">
            <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M8 3v4M16 3v4M4 10h16"></path></svg><span>日期计算</span>
          </button>
        </div>

        <div class="mode-tabs" role="tablist" aria-label="计算模式">
          <button class="mode-button active" data-mode="diff" type="button">计算间隔</button>
          <button class="mode-button" data-mode="shift" type="button">往前 / 往后推算</button>
        </div>

        <section class="result-card" id="resultCard" aria-live="polite">
          <div class="result-head"><span id="resultLabel">时间差</span><span class="result-status"><i></i><span id="resultStatus">等待计算</span></span></div>
          <div class="result-value" id="resultValue"><span class="placeholder-result">--</span></div>
          <div class="result-description" id="resultDescription">填写开始与结束时间，结果会显示在这里</div>
          <button class="result-copy" id="resultCopy" type="button" hidden>复制结果</button>
          <div class="result-decoration" aria-hidden="true"><span></span><span></span><span></span></div>
        </section>

        <section class="form-card" id="formCard"></section>

        <div class="calculator-actions">
          <button class="clear-button" id="clearButton" type="button">清空</button>
          <button class="calculate-button" id="calculateButton" type="button">开始计算</button>
        </div>
      </section>

      <section class="page" id="historyPage" aria-label="计算记录">
        <div class="page-heading"><div><h1>计算记录</h1><p>点击记录可以重新带入计算</p></div><button class="text-button clear-history-button" id="clearAllHistory" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13h10l1-13"></path><path d="M9 7V4h6v3"></path></svg><span>清空全部</span></button></div>
        <div class="history-filters" role="tablist" aria-label="记录筛选">
          <button class="filter-button active" data-filter="all" type="button">全部</button>
          <button class="filter-button" data-filter="time" type="button">时间</button>
          <button class="filter-button" data-filter="date" type="button">日期</button>
        </div>
        <div class="history-container" id="historyContainer"></div>
      </section>

      <section class="page" id="settingsPage" aria-label="设置">
        <div class="page-heading"><div><h1>设置</h1><p>修改会自动保存</p></div><button class="text-button restore-settings-button" id="restoreSettings" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 1 0 2.4-5.7L4 8"></path><path d="M4 4v4h4"></path></svg><span>恢复默认</span></button></div>

        <section class="settings-section"><h2>输入与启动</h2><div class="settings-card">
          <div class="setting-row input-mode-row"><div class="input-mode-options" id="inputModeSetting" role="radiogroup" aria-label="输入方式"><button class="input-mode-option" data-value="numeric" type="button" role="radio"><i aria-hidden="true">✓</i><b>数字</b><small>手动输入时分与日期</small></button><button class="input-mode-option" data-value="native" type="button" role="radio"><i aria-hidden="true">✓</i><b>系统</b><small>使用设备原生选择器</small></button></div></div>
          <div class="setting-row link-row" data-setting-page="defaultCalculator" role="button"><div class="setting-copy"><strong>默认计算器</strong><small id="defaultCalculatorSummary">时间计算器</small></div><span>›</span></div>
          <div class="setting-row link-row" data-setting-page="defaultMode" role="button"><div class="setting-copy"><strong>默认模式</strong><small id="defaultModeSummary">计算间隔</small></div><span>›</span></div>
        </div></section>

        <section class="settings-section"><h2>计算与记录</h2><div class="settings-card">
          <div class="setting-row"><div class="setting-copy"><strong>连续累计</strong><small>将推算结果作为下一次基准</small></div><label class="switch"><input id="accumulationSetting" type="checkbox" aria-label="连续累计"><span class="slider"></span></label></div>
          <div class="setting-row"><div class="setting-copy"><strong>震动反馈</strong><small>在支持的设备上提供轻触反馈</small></div><label class="switch"><input id="vibrationSetting" type="checkbox" aria-label="震动反馈"><span class="slider"></span></label></div>
          <div class="setting-row link-row" data-setting-page="historyLimit" role="button"><div class="setting-copy"><strong>记录数量</strong><small id="historyLimitSummary">最多保留10条</small></div><span>›</span></div>
        </div></section>

        <section class="settings-section"><h2>外观</h2><div class="settings-card">
          <div class="setting-row link-row" data-setting-page="appearance" role="button"><div class="setting-copy"><strong>显示模式</strong><small id="appearanceSummary">浅色</small></div><span>›</span></div>
          <div class="setting-row"><div class="setting-copy"><strong>紧凑布局</strong><small>缩小间距，一屏显示更多内容</small></div><label class="switch"><input id="compactSetting" type="checkbox" aria-label="紧凑布局"><span class="slider"></span></label></div>
        </div></section>

        <section class="settings-section"><h2>关于</h2><div class="settings-card">
          <div class="setting-row link-row" data-setting-page="about" role="button"><div class="setting-copy"><strong>时间计算器 2.0 Beta 版</strong><small>功能说明、数据与版本信息</small></div><span>›</span></div>
        </div></section>
        <p class="settings-footnote">所有计算和记录仅保存在当前浏览器中</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主要导航">
      <button class="nav-button active" data-page="calculator" type="button"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 7v5l3 2"></path></svg><span>计算</span></button>
      <button class="nav-button" data-page="history" type="button"><svg viewBox="0 0 24 24"><path d="M5 6h14M5 12h14M5 18h9"></path></svg><span>记录</span></button>
      <button class="nav-button" data-page="settings" type="button"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1A7 7 0 0 0 15 6l-.3-2.6h-4L10.4 6A7 7 0 0 0 8.8 7L6.5 6 4.4 9.5 6.5 11a7 7 0 0 0 0 2l-2 1.5L6.5 18l2.3-1a7 7 0 0 0 1.6 1l.3 2.6h4L15 18a7 7 0 0 0 1.6-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"></path></svg><span>设置</span></button>
    </nav>
  </div>

  <div class="sheet-overlay" id="sheetOverlay" aria-hidden="true">
    <section class="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-handle"></div><div class="sheet-header"><div><h2 id="sheetTitle"></h2><p id="sheetSubtitle"></p></div><button class="sheet-close" id="sheetClose" type="button" aria-label="关闭">×</button></div><div class="sheet-content" id="sheetContent"></div>
    </section>
  </div>

  <div class="confirm-overlay" id="confirmOverlay" aria-hidden="true">
    <section class="confirm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle"><h2 id="confirmTitle">清空全部记录？</h2><p id="confirmText">清空后无法恢复，请确认是否继续。</p><div><button id="confirmCancel" type="button">取消</button><button id="confirmOk" type="button">确认清空</button></div></section>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="./js/app.js"></script>
</body>
</html>
